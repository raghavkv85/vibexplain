<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vibexplain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>⚡ vibexplain</h1>
    <span class="status" id="status">connecting…</span>
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">🌙</button>
  </header>
  <div class="toolbar">
    <button class="tab active" data-panel="mindmap">Mind Map</button>
    <button class="tab" data-panel="arch">Architecture</button>
    <button class="tab" data-panel="graph">Dependencies</button>
    <select id="session-select" class="session-select" title="Switch session">
      <option value="live">● Live session</option>
    </select>
  </div>
  <main>
    <section id="left-panel">
      <div id="mindmap-view" class="panel-view active">
        <svg id="mindmap" width="100%" height="100%"></svg>
      </div>
      <div id="arch-view" class="panel-view">
        <svg id="arch-svg" width="100%" height="100%"></svg>
      </div>
      <div id="graph-view" class="panel-view">
      </div>
    </section>
    <div class="divider" id="divider"></div>
    <section id="narrative-panel">
      <h2>What's happening</h2>
      <div id="narrative"></div>
    </section>
  </main>
  <script>
    window.themeColor = function(v) {
      var c = getComputedStyle(document.documentElement).getPropertyValue(v).trim();
      if (c) return c;
      var defaults = {'--bg':'#0d1117','--surface':'#161b22','--border':'#30363d','--text':'#e6edf3','--dim':'#8b949e','--accent':'#58a6ff'};
      return defaults[v] || '#161b22';
    };
  </script>
  <script src="mindmap.js"></script>
  <script src="arch.js"></script>
  <script src="graph.js"></script>
  <script src="history.js"></script>
  <script src="app.js"></script>
</body>
</html>
